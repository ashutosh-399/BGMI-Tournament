<div class="login-wrapper">

  <div class="login-card">

    <!-- Header -->
    <div class="text-center mb-4">
      <h2 class="fw-bold">Welcome Back</h2>
      <p class="sub-text">Login to continue</p>
    </div>

    <!-- Form -->
    <form #form="ngForm" (ngSubmit)="onLogin(form)">

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          [(ngModel)]="loginForm.email"
          name="email"
          class="form-control custom-input"
          placeholder="Enter your email *"
          required>
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label class="form-label">Password</label>
        <input
          type="password"
          [(ngModel)]="loginForm.password"
          name="password"
          class="form-control custom-input"
          placeholder="Enter your password *">
      </div>

      <!-- Options -->
      <div class="d-flex justify-content-between align-items-center mb-3 small">
        <div>
          <input type="checkbox" id="remember">
          <label for="remember" class="ms-1 sub-text">Remember me</label>
        </div>

        <a href="#" class="text-decoration-none forgot-link">
          Forgot password?
        </a>
      </div>

      <!-- Button -->
      <button type="submit" class="btn btn-login w-100">
        Login
      </button>

    </form>

    <!-- Footer -->
    <p class="text-center mt-3 mb-0 small sub-text">
      Don’t have an account?
      <a routerLink="/auth/register" class="fw-bold text-decoration-none">
        Create account
      </a>
    </p>

  </div>

</div>
